<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Snake Game</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="LevelBtn/lvl.css">
</head>
<body>
  <div class="container">
    <h1 class="pixel-text">Snake Game</h1>
    <div class="menu">
      <button id="start" class="pixel-text">Start</button>
      <button id="level" class="pixel-text">Select a Level</button>
      <button id="high-score" class="pixel-text">High Score</button>
      <button id="settings" class="pixel-text">Settings</button>
      <button id="quit" class="pixel-text">Quit</button>
    </div>
    <div id="levelMenu" class="level-menu">
      <h2 class="pixel-text">Select a Level</h2>
      <button id="easy" class="pixel-text">Easy</button>
      <button id="medium" class="pixel-text">Medium</button>
      <button id="hard" class="pixel-text">Hard</button>
      <button id="back" class="pixel-text">Back</button>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>
  <script src="script.js"></script>
</body>
</html>
